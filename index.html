<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Heavenis</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* LOGIN BOX */
#authBox {
  background: rgba(255,255,255,0.05);
  padding: 30px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  text-align: center;
  width: 300px;
  animation: fadeIn 1s ease;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #4e9eff;
  color: white;
  transition: 0.3s;
}

button:hover {
  background: #367be2;
}

/* LOADING SCREEN */
#loading {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  opacity: 0;
  pointer-events: none;
  transition: 1s;
}

/* HOME */
#home {
  display: none;
  text-align: center;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div id="authBox">
  <h2>🔥 Heavenis</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>

  <p id="status">❌ Non connecté</p>
</div>

<div id="loading">⚡ Connexion...</div>

<div id="home">
  <h1>Bienvenue sur Heavenis 🚀</h1>
  <p id="userInfo"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  setDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyClkb4-rehttm3TzISw-THEk_jNK_NcDOE",
  authDomain: "heavenisweb-215ef.firebaseapp.com",
  projectId: "heavenisweb-215ef",
  storageBucket: "heavenisweb-215ef.firebasestorage.app",
  messagingSenderId: "464797161134",
  appId: "1:464797161134:web:56f4f650f70df5ef187f3f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const status = document.getElementById("status");
const loading = document.getElementById("loading");
const authBox = document.getElementById("authBox");
const home = document.getElementById("home");
const userInfo = document.getElementById("userInfo");

// 🔐 REGISTER
window.register = async () => {
  const email = emailInput();
  const password = passwordInput();

  await createUserWithEmailAndPassword(auth, email, password);
};

// 🔐 LOGIN
window.login = async () => {
  const email = emailInput();
  const password = passwordInput();

  loading.style.opacity = 1;
  loading.style.pointerEvents = "all";

  await signInWithEmailAndPassword(auth, email, password);
};

// 🔄 AUTH STATE
onAuthStateChanged(auth, async (user) => {
  if (user) {
    status.innerText = "✅ Connecté";

    // 🔥 Animation transition
    setTimeout(() => {
      authBox.style.display = "none";
      loading.style.opacity = 0;
      home.style.display = "block";

      userInfo.innerText = "Connecté en tant que : " + user.email;
    }, 1500);

    // 💾 AUTO SAVE (toutes les 5 sec)
    setInterval(async () => {
      await setDoc(doc(db, "users", user.uid), {
        lastSeen: Date.now(),
        randomScore: Math.floor(Math.random() * 1000)
      });
      console.log("Auto-save 🔥");
    }, 5000);

  } else {
    status.innerText = "❌ Non connecté";
  }
});

// helpers
function emailInput() {
  return document.getElementById("email").value;
}

function passwordInput() {
  return document.getElementById("password").value;
}
</script>

</body>
</html>
