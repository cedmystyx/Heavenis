<!DOCTYPE html>
<html>
<head>
  <title>Heavenis</title>
</head>
<body>

<h1>🔥 Heavenis connecté</h1>
<button onclick="login()">Se connecter</button>
<button onclick="save()">Sauvegarder</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyClkb4-rehttm3TzISw-THEk_jNK_NcDOE",
    authDomain: "heavenisweb-215ef.firebaseapp.com",
    projectId: "heavenisweb-215ef",
    storageBucket: "heavenisweb-215ef.firebasestorage.app",
    messagingSenderId: "464797161134",
    appId: "1:464797161134:web:56f4f650f70df5ef187f3f",
    measurementId: "G-9C1TQ6G6GH"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.login = () => {
    signInAnonymously(auth)
      .then(() => alert("Connecté 🔥"))
      .catch(err => console.error(err));
  };

  window.save = async () => {
    await setDoc(doc(db, "users", "test"), {
      score: Math.floor(Math.random() * 1000)
    });
    alert("Donnée sauvegardée 💾");
  };
</script>

</body>
</html>
